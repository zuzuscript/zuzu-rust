name: Test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev libxml2-dev

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry and build output
        uses: Swatinem/rust-cache@v2

      - name: Check
        run: cargo check --locked

      - name: Run Rust tests
        run: cargo test --locked -- --test-threads=1

      - name: Run ZuzuScript tests
        run: >
          cargo run --locked --bin zuzu-rust-run-tests --
          -q -Istdlib/modules -Istdlib/test-modules languagetests stdlib/tests
